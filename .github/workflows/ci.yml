name: Backend CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Prisma Generate
      run: npm run db:generate

    - name: Type Check
      run: npm run type-check

    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npm run test
